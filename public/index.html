<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD App - Class Register</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <h1>Class register (CRUD APP)</h1>

    <div>
        <input type="text" id="courName" placeholder="Enter Name">
        <button onclick="addcourse()">add course</button>
    </div>

    <hr>

    <button onclick="getcourse()">refresh list</button>
    <ul id="list">

    </ul>

    <script>
        // Get API Base URL
        const API_BASE_URL = window.location.origin;
        console.log("🔗 API Base URL:", API_BASE_URL);

        // Get course
        async function getcourse() {
            try {
                console.log("📥 Fetching courses from:", `${API_BASE_URL}/api/getcourse`);
                let res = await fetch(`${API_BASE_URL}/api/getcourse`)
                
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                
                let data = await res.json()
                console.log("✅ Courses fetched:", data);
                
                let list = ""

                if (Array.isArray(data) && data.length > 0) {
                    data.forEach(element => {
                        list += `<li> <span> ${element.course}</span>
                          <div> <button class="edit-btn" onclick="updatecourse('${element._id}')">Edit</button>
                            <button class="del-btn" onclick="deletecourse('${element._id}')">Delete</button>
                            </div>
                            </li>`
                    });
                } else {
                    list = "<li style='color: #999;'>No courses added yet</li>";
                }

                document.querySelector("#list").innerHTML = list
            } catch (error) {
                console.error("❌ Error fetching courses:", error);
                document.querySelector("#list").innerHTML = `<li style='color: red;'>Error loading courses: ${error.message}</li>`;
            }
        }

        // Add course post method
        async function addcourse() {
            try {
                const course = document.querySelector("#courName").value
                if (!course.trim()) {
                    alert("Please enter a course name");
                    return;
                }
                
                console.log("📤 Adding course:", course);
                let res = await fetch(`${API_BASE_URL}/api/addcourse`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        course: course
                    })
                })

                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }

                let result = await res.json();
                console.log("✅ Course added:", result);
                
                getcourse();
                document.querySelector("#courName").value = ""
                alert("✅ Course added successfully!");
            } catch (error) {
                console.error("❌ Error adding course:", error);
                alert("Failed to add course: " + error.message);
            }
        }

        // Delete course method
        async function deletecourse(id) {
            if (confirm("pakka delete karna hai ?")) {
                try {
                    console.log("🗑️ Deleting course:", id);
                    let res = await fetch(`${API_BASE_URL}/api/deletecourse/${id}`, {
                        method: "DELETE"
                    });

                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }

                    let result = await res.json();
                    console.log("✅ Course deleted:", result);
                    
                    getcourse()
                    alert("✅ Course deleted successfully!");
                } catch (error) {
                    console.error("❌ Error deleting course:", error);
                    alert("Failed to delete course: " + error.message);
                }
            }
        }

        // Update course method
        async function updatecourse(id) {
            const newcourse = prompt("enter your name")

            if (newcourse) {
                try {
                    console.log("✏️ Updating course:", id, "to:", newcourse);
                    let res = await fetch(`${API_BASE_URL}/api/updatecourse/${id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ course: newcourse })
                    })

                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }

                    let result = await res.json();
                    console.log("✅ Course updated:", result);
                    
                    getcourse()
                    alert("✅ Course updated successfully!");
                } catch (error) {
                    console.error("❌ Error updating course:", error);
                    alert("Failed to update course: " + error.message);
                }
            }
        }

        // Load courses on page load
        console.log("🚀 Loading courses on page load...");
        getcourse()
    </script>

</body>

</html>
